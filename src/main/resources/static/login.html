<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card bg-white p-5">
        <div class="text-center mb-4">
            <h3 class="fw-bold"> Đăng nhập </h3>

        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Tên đăng nhập</label>
                <input type="text" id="username" class="form-control" placeholder="Nhập username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">Đăng nhập</button>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="text-muted text-decoration-none">← Quay về Trang chủ</a>
        </div>

        <div id="message" class="mt-3 text-center"></div>
    </div>
</div>

<script>
    const API_LOGIN = "http://localhost:8080/api/auth/login";

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const messageDiv = document.getElementById("message");
        messageDiv.innerHTML = `<span class="text-info">Đang đăng nhập...</span>`;

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        try {
            const res = await fetch(API_LOGIN, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            // SỬA Ở ĐÂY: Chỉ cần res.ok là thành công (không cần kiểm tra role nghiêm ngặt)
            if (res.ok) {
                localStorage.setItem("currentLogin", JSON.stringify(data));
                messageDiv.innerHTML = `<span class="text-success">✅ Đăng nhập thành công! Đang chuyển hướng...</span>`;

                setTimeout(() => {
                    if (data.role === "ADMIN") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "index.html";
                    }
                }, 800);
            } else {
                messageDiv.innerHTML = `<span class="text-danger">❌ Sai tài khoản hoặc mật khẩu!</span>`;
            }
        } catch (err) {
            console.error(err);
            messageDiv.innerHTML = `<span class="text-danger">❌ Lỗi kết nối với server</span>`;
        }
    });
</script>
<script>
    function loginAdmin() {
        localStorage.setItem("role", "admin"); // 🔥 bắt buộc
        window.location.href = "index.html";   // quay về trang chính
    }

</script>

</body>
</html>
